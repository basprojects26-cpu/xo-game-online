                <ul>
                    <li>A 3x3 grid where each cell contains another 3x3 grid.</li>
                    <li>Your move determines which big square the opponent MUST play in.</li>
                    <li>Win a small grid to claim the big square!</li>
                    <li>If forced into a won/drawn square, you can play ANYWHERE.</li>
                </ul>
            </div>

            <button class="rules-back-btn" onclick="show_menu(),change_h1_menu()">Back to Menu</button>
        </div>`;
            document.getElementById("game").innerHTML = html;
        }
        function play_menu() {
            document.getElementById("menu").innerHTML = `
        <button onclick="choose_grid('pvp')">Challenge your Friend</button>
        <button onclick="choose_grid('pve')">AI Challenge</button>
        <button onclick="show_menu(),change_h1_menu()">Menu</button>
    `;
        }

        function choose_grid(mode) {
            let html = "";
            for (let size of [3, 4, 5]) html += `<button onclick="choose_difficulty('${mode}',${size})">${size}x${size}</button>`;
            html += `<button onclick="show_menu(),change_h1_menu()">Menu</button>`;
            document.getElementById("menu").innerHTML = html;
        }

        function choose_difficulty(mode, size) {
            if (mode === "pvp") { start_game(mode, size, null); return; }
            let html = `<button onclick="start_game('pve',${size},'easy')">Easy</button>
              <button onclick="start_game('pve',${size},'medium')">Medium</button>`;
            if (data.coins >= 50) html += `<button onclick="start_game('pve',${size},'hard')">Hard</button>`;
            else html += `<div id='hard_mode'>🔒Hard Locked (need 50 coins)</div>`;
            html += `<button onclick="show_menu(),change_h1_menu()">Menu</button>`;
            document.getElementById("menu").innerHTML = html;
        }

        function start_game(mode, size, difficulty) {
            if (current_game) return;
            let starter = Math.random() < 0.5 ? "X" : "O";
            let boardSize = mode === 'super' ? 81 : size * size;
            current_game = {
                size: size,
                mode: mode,
                difficulty: difficulty,
                board: Array(boardSize).fill(""),
                big_board: mode === 'super' ? Array(9).fill('') : null,
                next_big_square: null,
                small_wins: mode === 'super' ? { 'X': 0, 'O': 0 } : null,
                turn: starter,
                starting_player: starter,
                penalty_target: starter,
                game_over: false,
                started: false,
                ai_thinking: false,
                move_history: { "X": [], "O": [] }
            };
            render_game();
            if ((mode === "pve" || mode === "infinite") && current_game.difficulty !== "pvp" && current_game.turn === "O") {
                current_game.ai_thinking = true;
                setTimeout(ai_move, 400);
            }
        }

        function render_game() {
            let g = current_game;
            let symbols = get_symbols();
            let score_html = "";
            let online_bar = "";

            if (is_online_mode) {
                update_coin_display();
                let oppName = opponent_profile ? opponent_profile.name : 'Opponent';
                let oppAvatar = opponent_profile ? opponent_profile.avatar : '\u{1F464}';
                let modeName = g.mode === 'infinite' ? 'Infinite' : g.mode === 'randomizer' ? 'Randomizer' : g.mode === 'super' ? 'Super' : 'Classic';
                online_bar = `
                    <div class="online-scorebar">
                        <div class="os-player os-me">
                            <span class="os-avatar">${data.avatar}</span>
                            <span class="os-name">${data.username}</span>
                            <span class="os-pts">${online_scores.me} pts</span>
                        </div>
                        <div class="os-center">
                            <span class="os-vs">VS</span>
                            <span class="os-round">Round ${online_game_number} \u2022 ${modeName} ${g.size}x${g.size}</span>
                        </div>
                        <div class="os-player os-opp">
                            <span class="os-pts">${online_scores.opp} pts</span>
                            <span class="os-name">${oppName}</span>
                            <span class="os-avatar">${oppAvatar}</span>
                        </div>
                    </div>`;
            } else if (g.mode === "pve" || (g.mode === "infinite" && g.difficulty !== "pvp")) {
                update_coin_display(g.mode === "infinite" ? 'infinite' : g.size, g.difficulty);
                let key = (g.mode === 'infinite') ? `infinite_${g.difficulty}` : `${g.size}x${g.size}_${g.difficulty}`;
                let sc = data.scores[key] || { wins: 0, losses: 0, draws: 0 };
                score_html = `<div id="score">Score - Wins:${sc.wins} Losses:${sc.losses} Draws:${sc.draws}</div>`;
            } else { update_coin_display(); }

            document.getElementById("menu").innerHTML = "";

            let turnText;
            if (g.game_over) {
                let w = null;
                if (g.mode === 'super') {
                    w = check_winner(g.big_board, 3);
                    if (!w && !g.big_board.includes("")) {
                        if (g.small_wins['X'] > g.small_wins['O']) w = 'X';
                        else if (g.small_wins['O'] > g.small_wins['X']) w = 'O';
                    }
                } else {
                    w = check_winner(g.board, g.size);
                }

                if (is_online_mode) {
                    turnText = w ? (w === my_online_symbol ? 'You Win! \uD83C\uDF89' : 'You Lose!') : 'Draw!';
                } else {
                    turnText = w ? `${symbols[w]} Wins!` : 'Draw!';
                }
            } else {
                turnText = is_online_mode
                    ? (g.turn === my_online_symbol ? 'Your Turn' : "Opponent's Turn")
                    : `Current move: ${symbols[g.turn]}`;
                if (g.mode === 'randomizer') turnText += ' (Randomizer)';
            }

            let replayDisplay = g.game_over ? 'inline-block' : 'none';
            let replayText = replay_requested ? 'Waiting for opponent...' : (is_online_mode ? 'Play Again?' : 'Replay');
            let replayBtn;
            if (is_online_mode && !g.game_over) {
                replayBtn = `<button id="replay" style="display:none;" onclick="request_online_replay()">Play Again?</button><div id="replay-status" style="display:none; color:#ffcc00; font-size:16px; margin:10px 0;"></div>`;
            } else if (is_online_mode && g.game_over) {
                replayBtn = `<button id="replay" style="display:inline-block;${replay_requested ? 'opacity:0.6;pointer-events:none;' : ''}" onclick="request_online_replay()">${replayText}</button><div id="replay-status" style="display:${replay_requested ? 'block' : 'none'}; color:#ffcc00; font-size:16px; margin:10px 0;">${replay_requested ? '\u2705 You are ready!' : ''}</div>`;
            } else {
                replayBtn = `<button id="replay" style="display:${replayDisplay};" onclick="reset_game()">Replay</button>`;
            }
            let leaveBtn = is_online_mode
                ? `<button onclick="confirm_leave_online()">Leave Room</button>`
                : `<button onclick="confirm_leave()">Menu</button>`;

            if (g.mode === 'super') {
                document.getElementById("game").innerHTML = `
        ${online_bar}
        ${score_html}
        <div id="status">${turnText}</div>
        <div id="grid" class="super-grid"></div>
        ${replayBtn}
        ${leaveBtn}
    `;
                let grid = document.getElementById("grid");
                for (let big_idx = 0; big_idx < 9; big_idx++) {
                    let bigCell = document.createElement("div");
                    bigCell.className = "big-cell";


                    if (!g.game_over && (g.next_big_square === null || g.next_big_square === big_idx) && g.big_board[big_idx] === "") {
                        bigCell.classList.add("highlight");
                    }

                    for (let small_idx = 0; small_idx < 9; small_idx++) {
                        let i = big_idx * 9 + small_idx;
                        let b = document.createElement("button");
                        b.className = "super-cell";
                        let symbolContent = g.board[i] ? symbols[g.board[i]] : "";
                        b.innerHTML = `<span>${symbolContent}</span>`;
                        b.onclick = () => play(i);
                        bigCell.appendChild(b);
                    }

                    if (g.big_board[big_idx] !== "") {
                        let overlay = document.createElement("div");
                        overlay.className = "big-cell-overlay";
                        if (g.big_board[big_idx] === "draw") {
                            overlay.classList.add("draw");
                            overlay.innerText = "Blocked";
                        } else {
                            overlay.innerText = symbols[g.big_board[big_idx]];
                        }
                        bigCell.appendChild(overlay);
                    }

                    grid.appendChild(bigCell);
                }
            } else {
                document.getElementById("game").innerHTML = `
        ${online_bar}
        ${score_html}
        <div id="status">${turnText}</div>
        <div id="grid" class="grid" style="grid-template-columns:repeat(${g.size}, auto)"></div>
        ${replayBtn}
        ${leaveBtn}
    `;
                let grid = document.getElementById("grid");
                for (let i = 0; i < g.board.length; i++) {
                    let b = document.createElement("button");
                    b.className = "cell";
                    let symbolContent = g.board[i] ? symbols[g.board[i]] : "";
                    b.innerHTML = `<span>${symbolContent}</span>`;
                    if (!g.game_over && g.mode === "infinite" && g.board[i] !== "") {
                        let hist = g.move_history[g.board[i]];
                        if (hist.length === 3 && hist[0] === i && g.turn === g.board[i]) {
                            b.classList.add("fading");
                        }
                    }
                    b.onclick = () => play(i);
                    grid.appendChild(b);
                }
            }
        }

        function play(i, from_network = false) {
            let g = current_game;
            if (g.board[i] !== "" || g.game_over || g.ai_thinking) return;

            if (g.mode === 'super') {
                let big_idx = Math.floor(i / 9);
                if (g.big_board[big_idx] !== "") return;
                if (!from_network && g.next_big_square !== null && g.next_big_square !== big_idx) {
                    show_toast("You must play in the highlighted grid!");
                    return;
                }
            }

            if (is_online_mode && !from_network) {
                if (g.turn !== my_online_symbol) {
                    show_toast("It's not your turn!");
                    return;
                }
                socket.emit('make_move', { roomId: online_room, index: i });
            }

            g.started = true;

            if (g.mode === "infinite") {
                let hist = g.move_history[g.turn];
                if (hist.length === 3) {
                    let first_move = hist.shift();
                    g.board[first_move] = "";
                }
                hist.push(i);
            }

            g.board[i] = g.turn;

            if (g.mode === 'super') {
                let big_idx = Math.floor(i / 9);
                let small_board = g.board.slice(big_idx * 9, big_idx * 9 + 9);
                let small_winner = check_winner(small_board, 3);


                if (small_winner) {
                    g.big_board[big_idx] = small_winner;
                    g.small_wins[small_winner]++;
                } else if (!small_board.includes("")) {
                    g.big_board[big_idx] = "draw";
                }

                let next_idx = i % 9;
                if (g.big_board[next_idx] !== "") {
                    g.next_big_square = null;
                } else {
                    g.next_big_square = next_idx;
                }
            }

            if (end_check()) return;
            g.turn = g.turn === "X" ? "O" : "X"; render_game();

            let is_ai_turn = !is_online_mode && (g.mode === "pve" || (g.mode === "infinite" && g.difficulty !== "pvp"));
            if (is_ai_turn && g.turn === "O") { g.ai_thinking = true; setTimeout(ai_move, 400); }
        }

        function ai_move() {
            let g = current_game;
            if (g.game_over) { g.ai_thinking = false; return; }
            let move;
            if (g.difficulty === "easy") move = ai_easy(g.board);
            else if (g.difficulty === "medium") move = ai_medium(g.board, g.size, "O", "X");
            else move = ai_hard(g.board, g.size, "O", "X");

            // Use play logic to handle infinite shift
            g.ai_thinking = false;
            play(move);
        }

        function end_check() {
            let g = current_game;
            let winner = null;
            if (g.mode === 'super') {
                winner = check_winner(g.big_board, 3);
                if (!winner && !g.big_board.includes("")) {
                    if (g.small_wins['X'] > g.small_wins['O']) winner = 'X';
                    else if (g.small_wins['O'] > g.small_wins['X']) winner = 'O';
                    else winner = 'draw';
                }
            } else {
                winner = check_winner(g.board, g.size);
            }

            if (winner && winner !== 'draw') {
                g.game_over = true;
                if (is_online_mode) {
                    socket.emit('game_ended', { roomId: online_room, winner: winner });
                    if (winner === my_online_symbol) { online_scores.me += 1; trigger_confetti(); trigger_coins(); }
                    else { online_scores.opp += 1; trigger_shake(); }
                } else if (g.mode === "pvp" || g.difficulty === "pvp") {
                    trigger_confetti();
                } else {
                    let result = winner === "X" ? "wins" : "losses";
                    if (result === "wins") { trigger_coins(); } else { trigger_shake(); }
                    update_score(g.mode === "infinite" || g.mode === "randomizer" ? g.mode : g.size, g.difficulty, result);
                    data.coins += calculate_coins(g.mode === "infinite" || g.mode === "randomizer" ? g.mode : g.size, g.difficulty, result);
                    save_data(data); update_coin_display();
                }
                render_game();
                if (is_online_mode) {
                    document.getElementById("status").innerText = winner === my_online_symbol ? 'You Win! \uD83C\uDF89' : 'You Lose!';
                } else {
                    let symbols = get_symbols();
                    document.getElementById("status").innerText = `${symbols[winner]} Wins!`;
                }
                document.getElementById("replay").style.display = "inline-block";
                return true;
            }
            if ((!g.board.includes("") && g.mode !== "infinite" && g.mode !== "super") || winner === 'draw') {
                if (g.mode === 'randomizer') { handle_randomizer_draw(); return false; }
                g.game_over = true;
                if (is_online_mode) {
                    socket.emit('game_ended', { roomId: online_room, winner: 'draw' });
                    online_scores.me += 0.5; online_scores.opp += 0.5;
                } else if (g.mode === "pve" || (g.mode === "infinite" && g.difficulty !== "pvp")) {
                    update_score(g.mode === "infinite" ? 'infinite' : g.size, g.difficulty, "draws");
                    data.coins += calculate_coins(g.mode === "pve" ? g.size : 'infinite', g.difficulty, "draws");
                    save_data(data); update_coin_display();
                }
                render_game();
                document.getElementById("status").innerText = "Draw!";
                document.getElementById("replay").style.display = "inline-block";
                return true;
            }
            return false;
        }

        function handle_randomizer_draw() {
            let g = current_game;
            let other = g.penalty_target === "X" ? "O" : "X";
            let target_count, other_count;

            if (g.size === 3) { target_count = 2; other_count = 1; }
            else if (g.size === 4) { target_count = 2; other_count = 2; }
            else { target_count = 3; other_count = 2; }

            function clear_random(symbol, count) {
                let indices = [];
                for (let i = 0; i < g.board.length; i++) if (g.board[i] === symbol) indices.push(i);
                for (let c = 0; c < count; c++) {
                    if (indices.length === 0) break;
                    let rand_idx = Math.floor(Math.random() * indices.length);
                    g.board[indices[rand_idx]] = "";
                    indices.splice(rand_idx, 1);
                }
            }

            clear_random(g.penalty_target, target_count);
            clear_random(other, other_count);

            g.penalty_target = other;

            // Smooth Message for Randomizer Draw
            show_toast("DRAW: RANDOM TILES CLEARED!");
            render_game();

            if (is_online_mode && g.turn === my_online_symbol) {
                socket.emit('randomizer_sync', { roomId: online_room, board: g.board });
            }
        }

        function confirm_leave() {
            let g = current_game;
            let is_paid_mode = (g.mode === "pve" || g.mode === "infinite") && g.difficulty !== "pvp";
            if (!g.game_over && g.started && is_paid_mode) {
                show_confirm_modal("Leaving now counts as a loss. Are you sure?", () => {
                    update_score(g.mode === "infinite" ? 'infinite' : g.size, g.difficulty, "losses");
                    data.coins += calculate_coins(g.mode === "pve" ? g.size : 'infinite', g.difficulty, "losses");
                    save_data(data);
                    update_coin_display();
                    current_game = null;
                    show_menu();
                    change_h1_menu();
                });
            } else {
                current_game = null;
                show_menu();
                change_h1_menu();
            }
        }

        function reset_game() {
            let g = current_game;
            let starter = Math.random() < 0.5 ? "X" : "O";
            let boardSize = g.mode === 'super' ? 81 : g.size * g.size;
            g.board = Array(boardSize).fill("");
            if (g.mode === 'super') {
                g.big_board = Array(9).fill('');
                g.next_big_square = null;
                g.small_wins = { 'X': 0, 'O': 0 };
            }
            g.turn = starter;
            g.starting_player = starter;
            g.penalty_target = starter;
            g.game_over = false;
            g.started = false;
            g.ai_thinking = false;
            g.move_history = { "X": [], "O": [] };
            render_game();

            let is_ai_turn = (g.mode === "pve" || (g.mode === "infinite" && g.difficulty !== "pvp"));
            if (is_ai_turn && g.turn === "O") {
                g.ai_thinking = true;
                setTimeout(ai_move, 400);
            }
        }

        function request_online_replay() {
            if (replay_requested) return;
            replay_requested = true;
            socket.emit('request_replay', { roomId: online_room });
            let btn = document.getElementById('replay');
            if (btn) { btn.innerText = 'Waiting for opponent...'; btn.style.opacity = '0.6'; btn.style.pointerEvents = 'none'; }
            let rs = document.getElementById('replay-status');
            if (rs) { rs.innerText = '\u2705 You are ready!'; rs.style.display = 'block'; }
            show_toast('Waiting for opponent to accept...');
        }

        function reset_game_online(starter) {
            let g = current_game;
            let boardSize = g.mode === 'super' ? 81 : g.size * g.size;
            g.board = Array(boardSize).fill("");
            if (g.mode === 'super') {
                g.big_board = Array(9).fill('');
                g.next_big_square = null;
                g.small_wins = { 'X': 0, 'O': 0 };
            }
            g.turn = starter;
            g.starting_player = starter;
            g.penalty_target = starter;
            g.game_over = false;
            g.started = false;
            g.ai_thinking = false;
            g.move_history = { 'X': [], 'O': [] };
            replay_requested = false;
            render_game();
        }

        function show_friends_page() {
            let sidebar = document.getElementById('friend-request-sidebar');
            if (sidebar && !sidebar.classList.contains('open')) {
                toggle_friend_sidebar();
            }
        }

        function build_friend_card(f, online) {
            let statusClass = online ? 'friend-online' : 'friend-offline';
            let statusText = online ? '● Online' : '● Offline';
            return `<div class="friend-card">
                <div class="friend-card-avatar">${f.avatar}</div>
                <div class="friend-card-info">
                    <div class="friend-card-name">${f.name}</div>
                    <div class="friend-card-id">${f.id}</div>
                    <div class="friend-card-status ${statusClass}">${statusText}</div>
                </div>
                <div class="friend-card-actions">
                    <button class="friend-remove-btn" onclick="remove_friend('${f.id}')">Remove</button>
                </div>
            </div>`;
        }

        function refresh_friend_cards(statuses) {
            let container = document.getElementById('friends-list-container');
            if (!container) return;
            let listHtml = '';
            data.friends.forEach(f => {
                let online = statuses ? statuses[f.id] : false;
                listHtml += build_friend_card(f, online);
            });
            container.innerHTML = '<div class="friends-scroll-container">' + listHtml + '</div>';
        }

        function add_friend_action() {
            let id = document.getElementById('friend_id_input').value.trim().toUpperCase();
            if (!id || !id.startsWith('XO-') || id.length < 5) { show_toast('Invalid Player ID! Format: XO-XXXXX'); return; }
            if (id === data.player_id) { show_toast("You can't add yourself!"); return; }
            if (data.friends.find(f => f.id === id)) { show_toast('Already in your friend list!'); return; }
            if (!socket) { show_toast('Not connected to server!'); return; }
            socket.emit('send_friend_request', {
                targetId: id,
                fromProfile: { name: data.username, avatar: data.avatar }
            });
            document.getElementById('friend_id_input').value = '';
        }

        function remove_friend(id) {
            data.friends = data.friends.filter(f => f.id !== id);
            save_data(data);
            if (socket) {
                socket.emit('remove_friend', { friendId: id });
            }
            show_toast('Friend removed.');
            render_friend_requests();
        }

        function confirm_leave_online() {
            show_confirm_modal('Leave the online room?', () => {
                if (socket && online_room) {
                    socket.emit('leave_room', online_room);
                }
                is_online_mode = false;
                online_room = '';
                current_game = null;
                show_menu();
                change_h1_menu();
            });
        }

        function shop() {
            update_coin_display();
            let html = "<h3 id='locker'>Locker</h3>";
            let themesArray = [...Object.keys(THEME_PRICES)];
            for (let theme of themesArray) {
                html += `<div id="themes">`;
                html += `<span id='themes_logos'>${theme}</span>`;
                if (data.equipped === theme) html += "<span id='equip_span'>Equipped</span>";
                else if (data.themes[theme]) html += `<button id="equip_btn" onclick="equip('${theme}')">Equip</button>`;
                else html += `<button id='buy_btn' onclick="buy(event, '${theme}')">Buy (${THEME_PRICES[theme]})</button>`;
                html += '</div>';
            }
            html += `<button onclick="show_menu()">Menu</button>`;
            document.getElementById('menu').innerHTML = html;
        }

        function buy(e, theme) {
            let price = THEME_PRICES[theme] || 100;
            if (data.coins >= price) {
                data.coins -= price; data.themes[theme] = true;
                save_data(data); shop(); update_coin_display();
                trigger_ripple(e); show_toast('Purchase successful!');
            } else { show_toast('Not enough coins'); }
        }

        function equip(theme) {
            data.equipped = theme;
            save_data(data);
            shop();
            applyThemeVisuals(theme);
            show_toast('Theme equipped!');
        }
        function body_check() {
            const themeElement = document.getElementById('themes');
            if (document.body.contains(themeElement)) document.body.style.display = 'flex';
        }
        var title = document.getElementById('h1');
        function change_h1() { title.innerHTML = 'Choose your opponent'; }
        function change_h1_menu() { title.innerHTML = 'XO: GridWars'; }

        show_menu();
        // Initialize DND button state on load
        update_profile_icon();
        applyThemeVisuals(data.equipped);
    </script>
</body>
