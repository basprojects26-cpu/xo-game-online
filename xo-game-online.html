<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO: GridWars</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- MODERNIZED UI STYLES --- */
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent: blue;
            --text: #ffffff;
            --cell-bg: #0f3460;
        }

        body {
            text-align: center;
            background: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-top: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background 0.5s ease;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        /* --- ANIMATIONS ADDED --- */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px) rotate(-1deg);
            }

            50% {
                transform: translateX(10px) rotate(1deg);
            }

            75% {
                transform: translateX(-10px);
            }
        }

        .shake-effect {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes ripple {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(4);
                opacity: 0;
            }
        }

        .ripple-bg {
            position: fixed;
            width: 100px;
            height: 100px;
            background: rgba(0, 100, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: ripple 0.8s ease-out forwards;
        }

        .coin-particle {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 999;
            animation: drop-coin 2s linear forwards;
        }

        @keyframes drop-coin {
            0% {
                transform: translateY(-10vh) rotate(0);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 999;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
            }

            100% {
                transform: translateY(110vh) rotate(720deg);
            }
        }

        /* Custom Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
            /* Matches the background grid */
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #0064ff, #00d4ff);
            border-radius: 10px;
            border: 2px solid #000;
            /* Creates a padding effect */
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        /* Smooth Scrolling for the whole page */
        html {
            scroll-behavior: smooth;
        }

        /* Firefox Support */
        * {
            scrollbar-width: thin;
            scrollbar-color: #0064ff #000;
        }

        h1 {
            font-size: clamp(1.4rem, 5vw, 3rem);
            margin-bottom: 2px;
            text-shadow: 0 0 10px var(--accent);
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            margin-top: 10px;
            word-break: break-word;
        }

        #coin_display {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 5px var(--accent);
        }

        /* --- PROFILE BUTTON (moved to navbar) --- */
        #profile_container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #profile_btn {
            background: var(--card-bg);
            border: 2px solid var(--accent);
            border-radius: 50%;
            width: 60px;
            z-index: 2;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #username_display {
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            background: var(--accent);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 44px;
        }

        /* Container for Menu and Game */
        #menu,
        #game {

            padding: 30px;
            border-radius: 20px;


            /* Increased max-width to fit the Super Tic-Tac-Toe grid */
            max-width: 600px;
            width: 90%;
            transition: all 0.3s ease;
        }

        /* Buttons */
        button {
            z-index: 2;
            font-family: 'Orbitron', sans-serif;
            background: var(--cell-bg);
            max-width: 450px;
            width: 100%;
            height: auto;
            min-height: 60px;
            padding: 14px 24px;
            border-radius: 10px;
            color: white;
            outline: 0px;
            border: 1px solid transparent;
            margin: 6px auto;
            font-size: clamp(14px, 3vw, 22px);
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: block;
        }

        button:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Grid Styling */
        .grid {
            margin-top: 70px !important;
            display: grid;
            gap: 0px;
            margin: 25px auto;
            justify-content: center;
        }

        .cell {
            width: clamp(60px, 18vw, 80px);
            height: clamp(60px, 18vw, 80px);
            font-size: clamp(22px, 6vw, 32px);
            background: var(--cell-bg);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .cell:hover:not(:disabled) {
            background: #1a4a80;
        }

        .fading span {
            opacity: 0.3;
            filter: grayscale(1);
            transition: opacity 0.3s ease;
        }

        /* Super Tic-Tac-Toe Styling */
        .super-grid {
            margin: 70px auto 25px auto !important;
            display: grid;
            width: fit-content;
            max-width: 100%;
            grid-template-columns: repeat(3, auto);
            gap: 12px;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 100, 255, 0.3);
            box-sizing: border-box;
        }

        .big-cell {
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 2px;
            background: var(--bg-color);
            border-radius: 8px;
            padding: 2px;
            position: relative;
        }

        .big-cell.highlight {
            box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.5), 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .super-cell {
            width: clamp(30px, 8vw, 45px);
            height: clamp(30px, 8vw, 45px);
            aspect-ratio: 1 / 1;
            font-size: clamp(14px, 4vw, 22px);
            background: var(--cell-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            cursor: pointer;
            transition: background 0.2s;
            padding: 0;
            min-width: 0;
        }

        .super-cell:hover:not(:disabled) {
            background: #1a4a80;
        }

        .big-cell-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            font-weight: bold;
            border-radius: 8px;
            z-index: 10;
        }

        .big-cell-overlay.draw {
            background: #555;
            font-size: 40px;
        }

        /* Shop Items */
        #menu div:not(.spinner-ring) {
            background: rgba(255, 255, 255, 0.05);
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .spinner-ring {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ffcc00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            background: none !important;
        }

        .locked {
            pointer-events: none;
            opacity: 0.4;
        }

        #status {
            font-size: 20px;
            margin: 15px 0;
            font-weight: bold;
            color: var(--accent);
            margin-top: -20px;
            margin-bottom: -40px !important;
        }

        ul {
            text-align: left;
            line-height: 1.6;
        }

        /* Background flying X and O */
        .bg-animation {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation span {
            position: absolute;
            bottom: -100px;
            font-size: 60px;
            font-weight: bold;
            color: blue;
            animation: floatUp 12s linear infinite;
        }

        /* Random horizontal positions */
        .bg-animation span:nth-child(1) {
            left: 5%;
            animation-duration: 12s;
            font-size: 100px;
        }

        .bg-animation span:nth-child(2) {
            left: 15%;
            animation-duration: 18s;
            font-size: 70px;
        }

        .bg-animation span:nth-child(3) {
            left: 25%;
            animation-duration: 14s;
            font-size: 100px;
        }

        .bg-animation span:nth-child(4) {
            left: 35%;
            animation-duration: 20s;
            font-size: 100px;
        }

        .bg-animation span:nth-child(5) {
            left: 45%;
            animation-duration: 11s;
            font-size: 75px;
        }

        .bg-animation span:nth-child(6) {
            left: 55%;
            animation-duration: 17s;
            font-size: 65px;
        }

        .bg-animation span:nth-child(7) {
            left: 65%;
            animation-duration: 13s;
            font-size: 100px;
        }

        .bg-animation span:nth-child(8) {
            left: 75%;
            animation-duration: 16s;
            font-size: 100px;
        }

        .bg-animation span:nth-child(9) {
            left: 85%;
            animation-duration: 19s;
            font-size: 70px;
        }

        .bg-animation span:nth-child(10) {
            left: 30%;
            animation-duration: 15s;
            font-size: 100px;
        }

        .bg-animation span:nth-child(11) {
            left: 60%;
            animation-duration: 21s;
            font-size: 65px;
        }

        .bg-animation span:nth-child(12) {
            left: 80%;
            animation-duration: 12s;
            font-size: 75px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.15;
            }

            90% {
                opacity: 0.15;
            }

            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        #hard_mode {
            max-width: 450px !important;
            width: 100% !important;
            height: auto !important;
            min-height: 60px;
            font-size: clamp(14px, 3vw, 20px);
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            margin: 6px auto !important;
        }

        #score {
            color: white;
            margin-top: -60px !important;
            font-size: 20px !important;
            padding-top: 20px !important;
            margin-bottom: 50px !important;

        }

        #username_display {
            width: 140px;
            position: relative;
            left: -20%;

            background-color: #0064ff;
            height: 60px;
            line-height: 60px;
            border-top-right-radius: 30px;
            border-bottom-right-radius: 30px;
            z-index: 1;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #themes {
            height: 300px;
            width: 100% !important;
            max-width: 600px;
            line-height: 300px;
            margin: 0 auto 30px auto !important;
            position: relative;
            z-index: 2;
        }

        #buy_btn,
        #equip_btn {
            width: 100% !important;
            position: absolute;
            bottom: 0;
            left: 0;
            margin: 0 !important;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            height: 75px !important;
        }

        #equip_span {
            width: 100%;
            position: absolute;
            background-color: red;
            z-index: 2;
            height: 75px;
            bottom: 0;
            left: 0;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            line-height: 75px;
            font-family: 'Orbitron', sans-serif;
            font-size: 25px;
            font-weight: bold;
            display: block;
        }

        .O {
            font-family: 'Courier New', Courier, monospace !important;
        }

        #locker {
            margin-bottom: 30px;
            font-size: 45px;
            margin-top: 0px;
        }

        #themes img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        #rules_div {
            width: 100%;
            max-width: 700px;
            margin-top: -80px;
            font-size: 25px;
            margin-bottom: 40px !important;
        }

        #profile_pic {
            font-size: 50px;
            margin-top: -5px;
            margin-left: -25px;
            margin-bottom: 20px;

        }

        #data_username {
            width: 200px !important;
            display: flex !important;
            font-size: 100px !important;
            justify-content: center !important;
            align-items: center !important;
            height: 200px !important;
            border-radius: 50% !important;
            text-align: center !important;
            line-height: 300px !important;
            border: 2px solid var(--accent) !important;
            margin: 0 auto 30px auto !important;
        }

        #avatar {
            font-size: 100px !important;
        }

        #equiped_avatar {
            font-size: 40px !important;
            position: absolute;
            left: 42.5%;
        }

        #avatar_div {
            position: relative;
        }

        #managing_avatar {
            margin-top: 45px !important;
            margin-bottom: 30px !important;
            font-size: 23px;
        }

        #username_input {
            width: 100% !important;
        }

        #themes_logos {
            font-size: 110px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin-top: -30px;
            /* offset slightly above the button */
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* --- ADDED SMOOTH NOTIFICATION & CONFIRMATION STYLES --- */
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .toast {
            background: var(--card-bg);
            color: var(--text);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid var(--accent);
            margin-bottom: 10px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        #custom-confirm {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #custom-confirm.show {
            display: flex;
            opacity: 1;
        }

        .confirm-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--accent);
            text-align: center;
        }

        .confirm-box button {
            width: auto;
            min-width: 100px;
            margin: 10px;
        }

        /* Music Control Panel */
        #music_panel {
            position: absolute;
            top: 90px;
            left: 20px;
            background: rgba(22, 33, 62, 0.8);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        #music_panel button {
            width: 40px;
            height: 40px;
            padding: 0;
            font-size: 18px;
        }

        /* --- ONLINE MULTIPLAYER STYLES --- */
        .online-scorebar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 204, 0, 0.3);
            border-radius: 15px;
            padding: 12px 20px;
            margin-bottom: 20px;
            margin-top: -40px;
            backdrop-filter: blur(5px);
        }

        .os-player {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .os-me {
            color: #4ade80;
        }

        .os-opp {
            color: #fb7185;
        }

        .os-avatar {
            font-size: 28px;
        }

        .os-name {
            font-size: 14px;
            font-weight: bold;
        }

        .os-pts {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.5);
        }

        .os-center {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .os-vs {
            font-size: 16px;
            font-weight: bold;
            color: #ffcc00;
        }

        .os-round {
            font-size: 11px;
            color: #888;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .friend-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 10px;
            margin: 8px 0;
        }

        .friend-online {
            color: #4ade80;
        }

        .friend-offline {
            color: #888;
        }

        .player-id-display {
            color: #ffcc00;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        /* --- DND TOGGLE BUTTON --- */
        #dnd_btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 2px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #dnd_btn:hover {
            transform: scale(1.1);
        }

        #dnd_btn.dnd-active {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.15);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4), 0 0 40px rgba(239, 68, 68, 0.15);
            animation: dnd-pulse 2s ease-in-out infinite;
        }

        @keyframes dnd-pulse {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
            }

            50% {
                box-shadow: 0 0 25px rgba(239, 68, 68, 0.6), 0 0 50px rgba(239, 68, 68, 0.2);
            }
        }

        /* --- FRIEND REQUEST SIDEBAR --- */
        #friend-request-sidebar {
            position: fixed;
            top: 0;
            left: -380px;
            width: 360px;
            height: 100%;
            background: rgba(22, 33, 62, 0.95);
            backdrop-filter: blur(15px);
            border-right: 2px solid rgba(255, 204, 0, 0.3);
            z-index: 1000;
            transition: left 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            overflow-y: auto;
            padding: 20px;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.5);
        }

        #friend-request-sidebar.open {
            left: 0;
        }

        .fr-sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fr-sidebar-header h3 {
            color: #ffcc00;
            font-size: 16px;
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }

        .fr-sidebar-close {
            width: 36px !important;
            height: 36px !important;
            padding: 0 !important;
            font-size: 18px !important;
            border-radius: 50% !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            cursor: pointer;
            margin: 0 !important;
        }

        .fr-request-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 204, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: slideInCard 0.3s ease-out;
        }

        @keyframes slideInCard {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

            style="display:none;"></span></div>

    <h1 id="h1">XO: GridWars</h1>
    <div id="menu"></div>
    <div id="game"></div>
    <div class="bg-animation" id="bg_animation">
        <span>X</span>
        <span class="O">O</span>
        <span>X</span>
        <span class="O">O</span>
        <span>X</span>
        <span class="O">O</span>
        <span>X</span>
        <span class="O">O</span>
        <span>X</span>
        <span class="O">O</span>
        <span>X</span>
        <span class="O">O</span>
    </div>

    <script>
        // --- MUSIC SYSTEM ---
        // Replace this URL with your desired song link
        const MUSIC_URL = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3";
        const bg_music = new Audio(MUSIC_URL);
        bg_music.loop = true;
        bg_music.volume = 0.5;

        function start_music() {
            bg_music.play().catch(() => {
                // Handle browser autoplay restriction
                window.addEventListener('click', () => bg_music.play(), { once: true });
            });
        }

        function toggle_music() {
            bg_music.muted = !bg_music.muted;
            let icon = bg_music.muted ? "🔇" : "🔊";
            ['mute_btn', 'nav_mute_btn', 'drawer_mute_btn'].forEach(id => {
                let el = document.getElementById(id); if (el) el.innerText = icon;
            });
        }

        function change_volume(val) {
            bg_music.volume = val;
            ['volume_slider', 'drawer_volume_slider'].forEach(id => {
                let el = document.getElementById(id); if (el) el.value = val;
            });
        }

        // Start music on load
        start_music();

        const DATA_KEY = "ttt_data_v4";
        const THEME_PRICES = {
            "❌vs⭕": 1, "😂vs😭": 1000, "👍vs👎": 2000, "🥵vs🥶": 3000, "🐔vs🥚": 4000,
            "💧vs🔥": 5000, "🐶vs🦴": 6000, "🐒vs🍌": 7000, "🐻vs🍯": 8000,
            "🎹vs🎸": 9000, "🧛vs🧄": 10000, "🦠vs🧼": 11000
        };
        // Available Profile Pictures
        const AVATAR_PRICES = {
            "👤": 0, "😎": 500, "👑": 1500, "🥷": 2500, "🤖": 5000, "🧙": 8000
        };

        // === THEME VISUALS SYSTEM ===
        const THEME_VISUALS = {
            "❌vs⭕": { bg: '#1a1a2e', cardBg: '#16213e', accent: '#0064ff', cellBg: '#0f3460', text: '#ffffff', floats: ['X', 'O'] },
            "😂vs😭": { bg: '#1a0a2e', cardBg: '#241240', accent: '#ffd700', cellBg: '#2d1854', text: '#ffffff', floats: ['😂', '😭'] },
            "👍vs👎": { bg: '#0a1e1e', cardBg: '#0e2e2a', accent: '#00e676', cellBg: '#133d34', text: '#e0fff0', floats: ['👍', '👎'] },
            "🥵vs🥶": { bg: '#1a0e1e', cardBg: '#2a1028', accent: '#ff6f00', cellBg: '#1e2a44', text: '#ffffff', floats: ['🔥', '❄️'] },
            "🐔vs🥚": { bg: '#1e1408', cardBg: '#2a1e10', accent: '#ffab00', cellBg: '#33260e', text: '#fff8e1', floats: ['🐔', '🥚'] },
            "💧vs🔥": { bg: '#0e1428', cardBg: '#141e3a', accent: '#42a5f5', cellBg: '#1a2844', text: '#e3f2fd', floats: ['💧', '🔥'] },
            "🐶vs🦴": { bg: '#1a1816', cardBg: '#252220', accent: '#deb887', cellBg: '#302a24', text: '#faf0e6', floats: ['🐾', '🦴'] },
            "🐒vs🍌": { bg: '#0a1e0a', cardBg: '#122a12', accent: '#fdd835', cellBg: '#1a3a18', text: '#f0fff0', floats: ['🐒', '🍌'] },
            "🐻vs🍯": { bg: '#1a1610', cardBg: '#2a2218', accent: '#ffa000', cellBg: '#332a1a', text: '#fff8e1', floats: ['🐻', '🍯'] },
            "🎹vs🎸": { bg: '#0d0d0d', cardBg: '#1a1a1a', accent: '#ff4081', cellBg: '#262626', text: '#ffffff', floats: ['🎵', '🎶'] },
            "🧛vs🧄": { bg: '#1a0a0a', cardBg: '#2a1010', accent: '#b71c1c', cellBg: '#3a1616', text: '#ffcdd2', floats: ['🧛', '🧄'] },
            "🦠vs🧼": { bg: '#0a1a10', cardBg: '#102a18', accent: '#76ff03', cellBg: '#183a20', text: '#e8f5e9', floats: ['🦠', '🧼'] }
        };

        function applyThemeVisuals(themeName) {
            let key = themeName || "❌vs⭕";
            // Map equipped theme name to THEME_VISUALS key
            if (key === "XO") key = "❌vs⭕";
            let tv = THEME_VISUALS[key] || THEME_VISUALS["❌vs⭕"];
            let root = document.documentElement;
            root.style.setProperty('--bg-color', tv.bg);
            root.style.setProperty('--card-bg', tv.cardBg);
            root.style.setProperty('--accent', tv.accent);
            root.style.setProperty('--cell-bg', tv.cellBg);
            root.style.setProperty('--text', tv.text);
            // Update floating symbols
            let bgAnim = document.getElementById('bg_animation');
            if (bgAnim) {
                let spans = bgAnim.querySelectorAll('span');
                spans.forEach((span, i) => {
                    span.innerText = tv.floats[i % tv.floats.length];
                    span.style.color = tv.accent;
                    span.className = ''; // Remove .O class
                });
            }
        }

        // === DRAWER TOGGLE ===
        function toggleDrawer() {
            let drawer = document.getElementById('nav_drawer');
            let overlay = document.getElementById('drawer_overlay');
            if (!drawer || !overlay) return;
            let isOpen = drawer.classList.contains('open');
            if (isOpen) { drawer.classList.remove('open'); overlay.classList.remove('open'); }
            else { drawer.classList.add('open'); overlay.classList.add('open'); syncDrawer(); }
        }

        // === SYNC NAVBAR AND DRAWER ===
        function syncNavbar() {
            // Called whenever coins/profile change
            if (typeof data === 'undefined') return;
            let coinText = '🪙 ' + (data.coins === Infinity ? '∞' : data.coins);
            let nc = document.getElementById('nav_coins'); if (nc) nc.innerText = coinText;
            let np = document.getElementById('nav_profile_btn'); if (np) np.innerText = data.avatar;
            let nu = document.getElementById('nav_username'); if (nu) nu.innerText = data.username;
            // Navbar badge
            if (typeof pending_friend_requests !== 'undefined') {
                let nb = document.getElementById('nav_fr_badge');
                if (nb) {
                    if (pending_friend_requests.length > 0) {
                        nb.style.display = 'flex'; nb.innerText = pending_friend_requests.length;
                    } else { nb.style.display = 'none'; }
                }
            }
            // DND button sync
            if (data.dnd) {
                let ndb = document.getElementById('nav_dnd_btn');
                if (ndb) { ndb.innerText = '🔕'; ndb.classList.add('dnd-active'); }
            } else {
                let ndb = document.getElementById('nav_dnd_btn');
                if (ndb) { ndb.innerText = '🔔'; ndb.classList.remove('dnd-active'); }
            }
        }
        function syncDrawer() {
            if (typeof data === 'undefined') return;
            let da = document.getElementById('drawer_avatar'); if (da) da.innerText = data.avatar;
            let dn = document.getElementById('drawer_name'); if (dn) dn.innerText = data.username;
            let dc = document.getElementById('drawer_coins');
            if (dc) dc.innerText = '🪙 ' + (data.coins === Infinity ? '∞' : data.coins);
            let di = document.getElementById('drawer_dnd_icon'); if (di) di.innerText = data.dnd ? '🔕' : '🔔';
            let dt = document.getElementById('drawer_dnd_text');
            if (dt) dt.innerText = data.dnd ? 'DND: ON' : 'Do Not Disturb';
        }

        /* --- FX FUNCTIONS --- */
        function trigger_ripple(e) {
            const ripple = document.createElement("div");
            ripple.className = "ripple-bg";
            // Center ripple on mouse coordinates
            ripple.style.left = e.clientX + "px";
            ripple.style.top = e.clientY + "px";
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 800);
        }

        function trigger_shake() {
            document.body.classList.add("shake-effect");
            // "Buzz" simulation via vibration if supported
            if (navigator.vibrate) navigator.vibrate(200);
            setTimeout(() => document.body.classList.remove("shake-effect"), 400);
        }

        function trigger_coins() {
            for (let i = 0; i < 30; i++) {
                const coin = document.createElement("div");
                coin.className = "coin-particle";
                coin.innerText = "🪙";
                coin.style.left = Math.random() * 100 + "vw";
                coin.style.animationDelay = Math.random() * 0.5 + "s";
                document.body.appendChild(coin);
                setTimeout(() => coin.remove(), 2000);
            }
        }

        function trigger_confetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            for (let i = 0; i < 100; i++) {
                const c = document.createElement("div");
                c.className = "confetti";
                c.style.left = Math.random() * 100 + "vw";
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.width = Math.random() * 8 + 5 + "px";
                c.style.height = c.style.width;
                c.style.animationDuration = Math.random() * 2 + 1 + "s";
                c.style.opacity = Math.random();
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        /* --- NOTIFICATION & MODAL LOGIC --- */
        function show_toast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        function show_confirm_modal(msg, onYes) {
            const modal = document.getElementById('custom-confirm');
            const yesBtn = document.getElementById('confirm-yes');
            const noBtn = document.getElementById('confirm-no');
            document.getElementById('confirm-msg').innerText = msg;

            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);

            yesBtn.onclick = () => {
                modal.classList.remove('show');
                setTimeout(() => modal.style.display = 'none', 300);
                onYes();
            };
            noBtn.onclick = () => {
                modal.classList.remove('show');
                setTimeout(() => modal.style.display = 'none', 300);
            };
        }

        function update_coin_display(size = null, difficulty = null) {
            let div = document.getElementById("coin_display");
            if (!div) {
                div = document.createElement("div");
                div.id = "coin_display";
                div.style.position = "absolute";
                div.style.top = "20px";
                div.style.right = "20px";
                div.style.fontSize = "20px";
                div.style.fontWeight = "bold";
                div.style.textAlign = "right";
                div.style.display = "none"; // Hide completely as old UI
                document.body.appendChild(div);
            }
            let rewards = "";
            if (size && difficulty && current_game && current_game.mode !== "infinite") {
                rewards = "\n" + show_rewards(size, difficulty);
            } else if (size === 'infinite' && difficulty) {
                rewards = "\n" + show_rewards('infinite', difficulty);
            }
            div.innerText = `🪙 ${data.coins}${rewards}`;
            // Let the navbar sync update the new responsive interface
            syncNavbar();
            syncDrawer();
        }

        function load_data() {
            let raw = localStorage.getItem(DATA_KEY);
            let data;

            if (!raw) {
                data = {
                    coins: 0,
                    equipped: "XO",
                    avatar: "👤",
                    username: "Player",
                    unlocked_avatars: { "👤": true },
                    themes: { "XO": true },
                    scores: {}
                };
                for (let size of [3, 4, 5, 'infinite']) {
                    for (let diff of ["easy", "medium", "hard"]) {
                        let key = `${size}_${diff}`;
                        data.scores[key] = { wins: 0, losses: 0, draws: 0 };
                    }
                }
            } else {
                data = JSON.parse(raw);
            }

            if (!data.themes) data.themes = { "XO": true };
            for (let theme in THEME_PRICES) {
                if (!(theme in data.themes)) {
                    data.themes[theme] = false;
                }
            }

            // Ensure infinite mode scores exist in loaded data
            if (!data.scores['infinite_easy']) {
                for (let diff of ["easy", "medium", "hard"]) {
                    data.scores[`infinite_${diff}`] = { wins: 0, losses: 0, draws: 0 };
                }
            }

            if (!data.avatar) data.avatar = "👤";
            if (!data.username) data.username = "Player";
            if (!data.unlocked_avatars) data.unlocked_avatars = { "👤": true };
            if (!data.player_id) data.player_id = 'XO-' + Math.random().toString(36).substring(2, 7).toUpperCase();
            if (!data.friends) data.friends = [];
            if (data.dnd === undefined) data.dnd = false;
            data.coins = Infinity
            save_data(data);
            return data;
        }

        function save_data(data) { localStorage.setItem(DATA_KEY, JSON.stringify(data)); }
        let data = load_data();

        function update_profile_icon() {
            let pb = document.getElementById("profile_btn"); if (pb) pb.innerText = data.avatar;
            let ud = document.getElementById("username_display"); if (ud) ud.innerText = data.username;
            // Update DND button state
            let dndBtn = document.getElementById('dnd_btn');
            if (dndBtn) {
                dndBtn.innerText = data.dnd ? '🔕' : '🔔';
                if (data.dnd) dndBtn.classList.add('dnd-active');
                else dndBtn.classList.remove('dnd-active');
            }
            syncNavbar();
            syncDrawer();
        }

        function toggle_dnd() {
            data.dnd = !data.dnd;
            save_data(data);
            if (socket) socket.emit('set_dnd', data.dnd);
            let dndBtn = document.getElementById('dnd_btn');
            if (dndBtn) {
                dndBtn.innerText = data.dnd ? '🔕' : '🔔';
                if (data.dnd) dndBtn.classList.add('dnd-active');
                else dndBtn.classList.remove('dnd-active');
            }
            syncNavbar();
            syncDrawer();
            if (data.dnd) {
                show_toast('🔕 Do Not Disturb ON — Game invites blocked');
            } else {
                show_toast('🔔 Do Not Disturb OFF');
            }
        }

        function update_profile_on_server() {
            if (socket) {
                socket.emit('update_profile', { name: data.username, avatar: data.avatar });
            }
        }

        function toggle_friend_sidebar() {
            let sidebar = document.getElementById('friend-request-sidebar');
            if (!sidebar) return;
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            } else {
                render_friend_requests();
                sidebar.classList.add('open');
            }
        }

        function update_fr_badge() {
            let badge = document.getElementById('fr_badge');
            if (badge) {
                if (pending_friend_requests.length > 0) {
                    badge.style.display = 'flex';
                    badge.innerText = pending_friend_requests.length;
                } else {
                    badge.style.display = 'none';
                }
            }
            syncNavbar();
        }

        function render_friend_requests() {
            let sidebar = document.getElementById('friend-request-sidebar');
            if (!sidebar) return;

            let html = `<div class="fr-sidebar-header">
                <h3>👥 Social Menu</h3>
                <button class="fr-sidebar-close" onclick="document.getElementById('friend-request-sidebar').classList.remove('open')">✕</button>
            </div>`;

            // 1. Profile Code
            html += `<div style="background:rgba(255,204,0,0.1);border:1px solid #ffcc00;border-radius:10px;padding:12px;margin:10px 15px;">
                <p style="color:#888;font-size:12px;margin:0;text-align:center;">Your Player ID</p>
                <p class="player-id-display" onclick="navigator.clipboard.writeText('${data.player_id}');show_toast('ID Copied!')" style="font-size:18px;margin:5px 0 0 0;cursor:pointer;text-align:center;color:#ffcc00;">${data.player_id} 📋</p>
            </div>`;

            // 2. Add Friend
            html += `<div style="padding:0 15px; margin-bottom:15px;">
                <input type="text" id="friend_id_input" maxlength="10" placeholder="Player ID (XO-...)" style="width:100%; box-sizing:border-box; padding:8px; border-radius:5px; background:rgba(0,0,0,0.3); color:#ffcc00; border:1px solid #4ade80; text-align:center; font-family:'Orbitron',sans-serif; margin-bottom:5px;">
                <button onclick="add_friend_action()" style="width:100% !important; padding:8px !important; height:auto; margin:0; border:1px solid #4ade80; font-size:14px; border-radius:5px;">Add Friend</button>
            </div>`;

            // 3. Friends List
            html += `<div style="padding:0 15px;">
                <h4 style="margin:0 0 10px 0; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;">Your Friends (${data.friends.length})</h4>
                <div id="sidebar-friends-container" style="max-height:200px; overflow-y:auto; margin-bottom:15px;">`;

            if (data.friends.length === 0) {
                html += `<p style="color:#888; font-size:12px; text-align:center;">No friends yet.</p>`;
            } else {
                html += `<p style="color:#888; font-size:12px; text-align:center;">Loading status...</p>`;
            }
            html += `</div></div>`;

            // 4. Pending Requests
            html += `<div style="padding:0 15px;">
                <h4 style="margin:0 0 10px 0; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;">Pending Requests (${pending_friend_requests.length})</h4>`;

            if (pending_friend_requests.length === 0) {
                html += `<p style="color:#888; font-size:12px; text-align:center;">No pending requests.</p>`;
            } else {
                pending_friend_requests.forEach((req) => {
                    let avatar = req.fromProfile ? req.fromProfile.avatar : '👤';
                    let name = req.fromProfile ? req.fromProfile.name : 'Player';
                    html += `<div class="fr-request-card" id="fr-card-${req.fromId}" style="margin:0 0 10px 0;">
                        <div class="fr-request-info">
                            <div class="fr-request-avatar">${avatar}</div>
                            <div class="fr-request-details">
                                <div class="fr-request-name" style="font-size:14px;">${name}</div>
                                <div class="fr-request-id" style="font-size:10px;">${req.fromId}</div>
                            </div>
                        </div>
                        <div class="fr-request-actions">
                            <button class="fr-accept-btn" onclick="respond_friend_request('${req.fromId}', true)" style="font-size:12px; padding:4px 8px;">✅</button>
                            <button class="fr-deny-btn" onclick="respond_friend_request('${req.fromId}', false)" style="font-size:12px; padding:4px 8px;">❌</button>
                        </div>
                    </div>`;
                });
            }
            html += `</div>`;

            sidebar.innerHTML = html;
            update_fr_badge();

            // Fire async friend status update
            if (data.friends.length > 0 && socket) {
                let ids = data.friends.map(f => f.id);
                socket.emit('check_friends_online', ids, (results) => {
                    let updated = false;
                    let statuses = {};
                    data.friends.forEach(f => {
                        let res = results[f.id];
                        if (res) {
                            statuses[f.id] = res.online;
                            if (res.profile && (f.name !== res.profile.name || f.avatar !== res.profile.avatar)) {
                                f.name = res.profile.name;
                                f.avatar = res.profile.avatar;
                                updated = true;
                            }
                        }
                    });
                    if (updated) save_data(data);

                    let fContainer = document.getElementById('sidebar-friends-container');
                    if (!fContainer) return;
                    let listHtml = '';
                    data.friends.forEach(f => {
                        listHtml += build_friend_card(f, statuses[f.id]);
                    });
                    fContainer.innerHTML = listHtml;
                });
            } else if (data.friends.length > 0) {
                let fContainer = document.getElementById('sidebar-friends-container');
                if (fContainer) {
                    let listHtml = '';
                    data.friends.forEach(f => listHtml += build_friend_card(f, false));
                    fContainer.innerHTML = listHtml;
                }
            }
        }

        function respond_friend_request(fromId, accepted) {
            if (fromId === "null") fromId = null;
            let card = document.getElementById('fr-card-' + fromId);
            if (card) card.remove();
            pending_friend_requests = pending_friend_requests.filter(r => r.fromId !== fromId);
            if (socket) {
                socket.emit('respond_friend_request', { fromId: fromId, accepted: accepted });
            }
            if (accepted) {
                show_toast('Friend request accepted! 🎉');
            } else {
                show_toast('Friend request declined.');
            }
            render_friend_requests();
        }

        // PROFILE PAGE LOGIC
        function show_profile() {
            if (current_game) return;
            document.getElementById('game').innerHTML = '';
            let html = `<h3 id='profile_pic'>Profile</h3>
                <div id='data_username' style="font-size:50px; margin:10px;">${data.avatar}</div>
                <div id="input_btn_div">
                    <input type="text" id="username_input" maxlength="15" value="${data.username}" style="padding:8px; border-radius:5px; border:1px solid var(--accent); background:var(--bg-color); color:white; text-align:center;">
                    <button onclick="save_username()">Save Name</button>
                </div>`;
            html += `<p id="managing_avatar">Manage your Avatars</p>`;
            for (let av in AVATAR_PRICES) {
                html += `<div id='avatar_div'><span id='avatar'>${av}</span>`;
                if (data.avatar === av) html += "<span id='equiped_avatar'>Equipped</span>";
                else if (data.unlocked_avatars[av]) html += `<button onclick="equip_avatar('${av}')">Use</button>`;
                else html += `<button onclick="buy_avatar(event, '${av}')">Buy (${AVATAR_PRICES[av]})</button>`;
                html += '</div>';
            }
            html += `<button onclick="show_menu()">Back</button>`;
            document.getElementById('menu').innerHTML = html;
        }

        function save_username() {
            let input = document.getElementById("username_input");
            if (!input) return;
            let newName = input.value.trim();
            if (newName !== "") {
                if (newName.length > 15) {
                    show_toast("Username too long!");
                    return;
                }
                data.username = newName;
                save_data(data);
                update_profile_icon();
                update_profile_on_server();
                show_toast("Name saved: " + newName);
                show_profile();
            } else {
                show_toast("Name cannot be empty!");
            }
        }

        function buy_avatar(e, av) {
            let price = AVATAR_PRICES[av];
            if (data.coins >= price) {
                data.coins -= price;
                data.unlocked_avatars[av] = true;
                save_data(data);
                show_profile();
                update_coin_display();
                trigger_ripple(e);
                show_toast("Avatar purchased!");
            } else { show_toast("Not enough coins"); }
        }

        function equip_avatar(av) {
            data.avatar = av;
            save_data(data);
            update_profile_icon();
            update_profile_on_server();
            show_profile();
        }

        function get_symbols() {
            if (data.equipped === "XO") return { X: "X", O: "O" };
            let parts = data.equipped.split("vs");
            return { X: parts[0].trim(), O: parts[1].trim() };
        }

        function check_winner(board, size) {
            for (let r = 0; r < size; r++) {
                let row = board.slice(r * size, (r + 1) * size);
                if (row[0] !== "" && row[0] !== "draw" && row.every(v => v === row[0])) return row[0];
            }
            for (let c = 0; c < size; c++) {
                let col = [];
                for (let r = 0; r < size; r++) col.push(board[r * size + c]);
                if (col[0] !== "" && col[0] !== "draw" && col.every(v => v === col[0])) return col[0];
            }
            let d1 = []; for (let i = 0; i < size; i++) d1.push(board[i * size + i]);
            if (d1[0] !== "" && d1[0] !== "draw" && d1.every(v => v === d1[0])) return d1[0];
            let d2 = []; for (let i = 0; i < size; i++) d2.push(board[i * size + (size - 1 - i)]);
            if (d2[0] !== "" && d2[0] !== "draw" && d2.every(v => v === d2[0])) return d2[0];
            return null;
        }

        function get_empty(board) { return board.map((v, i) => v === "" ? i : null).filter(v => v !== null); }
        function ai_easy(board) {
            let empty = get_empty(board);
            return empty[Math.floor(Math.random() * empty.length)];
        }

        function ai_medium(board, size, ai, player) {
            let empty = get_empty(board);
            for (let m of empty) { board[m] = ai; if (check_winner(board, size) === ai) { board[m] = ""; return m; } board[m] = ""; }
            for (let m of empty) { board[m] = player; if (check_winner(board, size) === player) { board[m] = ""; return m; } board[m] = ""; }
            if (size % 2 === 1) { let c = Math.floor((size * size) / 2); if (board[c] === "") return c; }
            return ai_easy(board);
        }

        function ai_hard(board, size, ai, player) {
            if (size === 3) return minimax_root(board, size, ai, player);
            let empty = get_empty(board);
            for (let m of empty) { board[m] = ai; if (check_winner(board, size) === ai) { board[m] = ""; return m; } board[m] = ""; }
            for (let m of empty) { board[m] = player; if (check_winner(board, size) === player) { board[m] = ""; return m; } board[m] = ""; }
            return minimax_root(board, size, ai, player, 3);
        }

        function minimax_root(board, size, ai, player, depthLimit = Infinity) {
            let best = -Infinity; let move = null;
            for (let i = 0; i < board.length; i++) {
                if (board[i] === "") {
                    board[i] = ai;
                    let score = minimax(board, size, 0, false, -Infinity, Infinity, ai, player, depthLimit);
                    board[i] = "";
                    if (score > best) { best = score; move = i; }
                }
            }
            return move;
        }

        function minimax(board, size, depth, isMax, alpha, beta, ai, player, limit) {
            let winner = check_winner(board, size);
            if (winner === ai) return 100 - depth;
            if (winner === player) return depth - 100;
            if (!board.includes("")) return 0;
            if (depth >= limit) return 0;
            if (isMax) {
                let best = -Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === "") {
                        board[i] = ai;
                        let val = minimax(board, size, depth + 1, false, alpha, beta, ai, player, limit);
                        board[i] = ""; best = Math.max(best, val); alpha = Math.max(alpha, val);
                        if (beta <= alpha) break;
                    }
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === "") {
                        board[i] = player;
                        let val = minimax(board, size, depth + 1, true, alpha, beta, ai, player, limit);
                        board[i] = ""; best = Math.min(best, val); beta = Math.min(beta, val);
                        if (beta <= alpha) break;
                    }
                }
                return best;
            }
        }

            socket.on('game_invite', (info) => {

            socket.on('friend_request_received', (request) => {

        function calculate_coins(size, difficulty, result) {
            let table = {
                3: { easy: [2, 1, 0], medium: [4, 2, 0], hard: [50, 25, -50] },
                4: { easy: [4, 2, 0], medium: [10, 5, 0], hard: [100, 25, -50] },
                5: { easy: [10, 5, 0], medium: [25, 10, 0], hard: [250, 100, -50] },
                infinite: { easy: [10, 0, 0], medium: [25, 0, 0], hard: [200, 0, -50] }
            };
            let mode_table = table[size] || table.infinite;
            let [w, d, l] = mode_table[difficulty];
            if (result === "wins") return w; if (result === "draws") return d; if (result === "losses") return l;
            return 0;
        }

                4: { easy: [4, 2, 0], medium: [10, 5, 0], hard: [100, 25, -50] },

                infinite: { easy: [10, 0, 0], medium: [25, 0, 0], hard: [200, 0, -50] }
            };
            let mode_table = table[size] || table.infinite;
            let [win, draw, loss] = mode_table[difficulty];
            return `🪙 +${win} / ${draw} / ${loss}`;
        }
